<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Kind Radio</title>
  <meta name="description" content="The Kind Radio — Stream curated, feel-good music anytime, anywhere. Available on Android." />
  <meta property="og:title" content="The Kind Radio" />
  <meta property="og:description" content="Stream curated, feel-good music anytime, anywhere." />
  <meta property="og:type" content="website" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0E0E1A;
      --surface: #1A1528;
      --violet:  #A020F0;
      --purple:  #6A20FF;
      --text:    #F0EAFF;
      --sub:     #9880C0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      overflow-x: hidden;
    }

    /* ── Glow blob ─────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(106,32,255,.22) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid rgba(106,32,255,.25);
      border-radius: 28px;
      max-width: 420px;
      width: 100%;
      padding: 3rem 2.5rem 2.5rem;
      text-align: center;
      box-shadow: 0 0 60px rgba(106,32,255,.15);
    }

    /* ── Icon + rings ──────────────────────────────────────── */
    .icon-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.8rem;
    }
    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid rgba(106,32,255,.18);
      animation: pulse 3s ease-in-out infinite;
    }
    .ring:nth-child(2) { inset: -14px; animation-delay: .5s; }
    .ring:nth-child(3) { inset: -28px; animation-delay: 1s;  }
    @keyframes pulse {
      0%,100% { opacity: .6; transform: scale(1);    }
      50%      { opacity: .2; transform: scale(1.04); }
    }
    .app-icon {
      position: relative;
      z-index: 1;
      width: 120px;
      height: 120px;
      border-radius: 26px;
      object-fit: cover;
      box-shadow: 0 8px 32px rgba(106,32,255,.45);
    }

    /* ── Live pill ─────────────────────────────────────────── */
    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: linear-gradient(135deg, var(--violet), var(--purple));
      color: #fff;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .12em;
      padding: .25rem .75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

    /* ── Text ──────────────────────────────────────────────── */
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -.01em;
      background: linear-gradient(135deg, #fff 30%, var(--violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .6rem;
    }
    .tagline {
      color: var(--sub);
      font-size: .95rem;
      line-height: 1.55;
      margin-bottom: 2.2rem;
    }

    /* ── Wave bars ─────────────────────────────────────────── */
    .wave {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 28px;
      margin-bottom: 2rem;
    }
    .wave span {
      display: block;
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(to top, var(--purple), var(--violet));
      animation: wave-bar 1.1s ease-in-out infinite;
    }
    .wave span:nth-child(1)  { height:35%; animation-delay:0s;    }
    .wave span:nth-child(2)  { height:65%; animation-delay:.1s;   }
    .wave span:nth-child(3)  { height:90%; animation-delay:.2s;   }
    .wave span:nth-child(4)  { height:55%; animation-delay:.15s;  }
    .wave span:nth-child(5)  { height:100%;animation-delay:.05s;  }
    .wave span:nth-child(6)  { height:70%; animation-delay:.25s;  }
    .wave span:nth-child(7)  { height:45%; animation-delay:.35s;  }
    .wave span:nth-child(8)  { height:80%; animation-delay:.1s;   }
    .wave span:nth-child(9)  { height:60%; animation-delay:.3s;   }
    .wave span:nth-child(10) { height:35%; animation-delay:.2s;   }
    @keyframes wave-bar {
      0%,100% { transform: scaleY(1);   opacity: .9; }
      50%      { transform: scaleY(.35); opacity: .4; }
    }

    /* ── CTA button ────────────────────────────────────────── */
    .cta {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      background: linear-gradient(135deg, var(--purple), var(--violet));
      color: #fff;
      text-decoration: none;
      font-size: .95rem;
      font-weight: 600;
      padding: .85rem 1.8rem;
      border-radius: 16px;
      transition: opacity .2s, transform .2s;
      box-shadow: 0 6px 24px rgba(106,32,255,.4);
    }
    .cta:hover { opacity: .88; transform: translateY(-2px); }
    .cta svg { width:22px; height:22px; fill:#fff; flex-shrink:0; }

    /* ── Footer ────────────────────────────────────────────── */
    footer {
      position: relative;
      z-index: 1;
      margin-top: 2rem;
      color: rgba(152,128,192,.45);
      font-size: .75rem;
    }
  </style>
</head>
